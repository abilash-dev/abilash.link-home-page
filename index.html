    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }


        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(115deg,
                    #000000 5%,
                    #00102e 15%,
                    #002f50 30%,
                    #00617c 45%,
                    #028697 55%,
                    #0a719d 70%,
                    #001d4e 85%,
                    #000a1d 95%);
            background-size: 400% 400%;
            animation: gradientShift 3s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(46, 204, 113, 0.4));
            opacity: 0.95;
            transition: filter 0.3s ease;
        }

        .loading-text {
            font-family: 'Montserrat', 'Inter', Arial, sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c2185b 0%, #9c27b0 50%, #6a1b9a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 3rem;
            letter-spacing: 0.1em;
            opacity: 0.9;
        }

        .loading-bar-container {
            margin-top: 20px;
            width: 280px;
            height: 2px;
            background: rgba(46, 204, 113, 0.15);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #00ffea, transparent);
            border-radius: 1px;
            animation: loadingProgress 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            position: relative;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(82, 255, 200, 0.8), transparent);
            animation: loadingShine 1.5s ease-in-out infinite;
        }

        @keyframes loadingProgress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        @keyframes loadingShine {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .main-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        .main-content.show {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.8s ease-in, transform 0.8s ease-in;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Behind the content */
            background: linear-gradient(115deg,
                    #000000 5%,
                    #00102e 15%,
                    #002f50 30%,
                    #00617c 45%,
                    #028697 55%,
                    #0a719d 70%,
                    #001d4e 85%,
                    #000a1d 95%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease-in-out infinite;
        }

        #main-content {
            max-height: 100vh;
            overflow-x: hidden;
            transition: all 0.2s ease;
        }
    </style>

    <script>
        function updateMainContentScroll() {
            const minHeight = 650; // Customize your manual height limit
            const mainContent = document.getElementById('main-content');

            if (window.innerHeight < minHeight) {
                mainContent.style.overflowY = 'auto';  // Enable scroll if height is too small
            } else {
                mainContent.style.overflowY = 'hidden'; // No scroll otherwise
            }
        }

        // Trigger on load and resize
        window.addEventListener('load', updateMainContentScroll);
        window.addEventListener('resize', updateMainContentScroll);
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('background-video');
            if (video && video.paused) {
                video.muted = true;
                video.play().catch(err => {
                    console.error('Autoplay failed:', err);
                });
            }
        });

        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loadingScreen');
            const mainContent = document.getElementById('main-content');

            const delay = 1500;

            setTimeout(() => {
                loadingScreen.classList.add('fade-out');

                loadingScreen.addEventListener('transitionend', () => {
                    loadingScreen.style.display = 'none';

                    mainContent.classList.remove('hidden');
                    mainContent.classList.add('show');
                }, { once: true });
            }, delay);
        });

    </script>
